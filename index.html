<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <title>Cap Video Editor • Clip Merge Studio</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    #purchase-popup{
        position:fixed;
        inset:0;
        background:rgba(0,0,0,.65);
        display:none;
        flex-direction: column;
        gap: 15px;
        align-items:center;
        justify-content:center;
        z-index:999999;
    }

    #purchase-popup img{
        width:90%;
        max-width:380px;
        border-radius:18px;
        cursor:pointer;
        box-shadow:0 10px 35px rgba(0,0,0,.5);
    }

    /* CSS dyal l'bouton sfer li tzad */
    #purchase-yellow-btn {
        background-color: #facc15; /* Sfer */
        color: #1a1a1a;
        font-weight: bold;
        font-size: 1.1rem;
        padding: 12px 30px;
        border: none;
        border-radius: 30px;
        cursor: pointer;
        box-shadow: 0 8px 20px rgba(250, 204, 21, 0.4);
        transition: transform 0.2s, background-color 0.2s;
    }
    
    #purchase-yellow-btn:hover {
        background-color: #fde047;
        transform: scale(1.05);
    }

    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: #0b0b0f;
      color: #e9e9f0;
      height: 100vh;
      overflow: hidden;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 10px;
    }

    .editor-container {
      width: 100%;
      max-width: 1440px;
      height: 95vh;
      background: rgba(18, 18, 24, 0.75);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 36px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      box-shadow: 0 30px 50px rgba(0,0,0,0.7), 0 0 0 1px rgba(255,255,255,0.05);
      transition: all 0.3s ease;
    }

    .top-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 20px;
      border-bottom: 1px solid rgba(255,255,255,0.06);
      flex-wrap: wrap;
      gap: 10px;
    }

    .logo {
      font-weight: 700;
      font-size: 1.4rem;
      background: linear-gradient(135deg, #a78bfa, #60a5fa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: -0.5px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .logo i {
      background: linear-gradient(135deg, #7c3aed, #4f46e5);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      font-size: 1.8rem;
    }

    .actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .btn {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.08);
      color: #e0e0f0;
      padding: 8px 16px;
      border-radius: 30px;
      font-weight: 500;
      font-size: 0.9rem;
      display: flex;
      align-items: center;
      gap: 6px;
      backdrop-filter: blur(10px);
      cursor: pointer;
      transition: all 0.25s;
      white-space: nowrap;
    }

    .btn i { font-size: 0.9rem; }
    .btn:hover {
      background: rgba(255,255,255,0.14);
      border-color: rgba(255,255,255,0.2);
      transform: translateY(-1px);
    }

    .btn-primary {
      background: linear-gradient(135deg, #7c3aed, #4f46e5);
      border: none;
      color: white;
      font-weight: 600;
      box-shadow: 0 8px 18px rgba(124,58,237,0.35);
    }

    .btn-primary:hover { background: linear-gradient(135deg, #8b5cf6, #6366f1); }

    .btn-import {
      background: linear-gradient(135deg, #10b981, #059669);
      border: none;
      color: white;
      font-weight: 600;
      box-shadow: 0 8px 18px rgba(16,185,129,0.35);
    }

    .btn-import:hover { 
      background: linear-gradient(135deg, #34d399, #10b981);
      transform: translateY(-1px);
    }

    .btn-add {
      background: linear-gradient(135deg, #f59e0b, #d97706);
      border: none;
      color: white;
      font-weight: 600;
      box-shadow: 0 8px 18px rgba(245,158,11,0.35);
    }

    .btn-add:hover { 
      background: linear-gradient(135deg, #fbbf24, #f59e0b);
      transform: translateY(-1px);
    }

    .btn-music {
      background: linear-gradient(135deg, #ec4899, #be185d);
      border: none;
      color: white;
      font-weight: 600;
      box-shadow: 0 8px 18px rgba(236,72,153,0.35);
    }

    .btn-music:hover { 
      background: linear-gradient(135deg, #f472b6, #ec4899);
      transform: translateY(-1px);
    }

    .btn-image {
      background: linear-gradient(135deg, #06b6d4, #0891b2);
      border: none;
      color: white;
      font-weight: 600;
      box-shadow: 0 8px 18px rgba(6,182,212,0.35);
    }

    .btn-image:hover { 
      background: linear-gradient(135deg, #22d3ee, #06b6d4);
      transform: translateY(-1px);
    }

    .main-layout {
      display: flex;
      flex: 1;
      overflow: hidden;
      padding: 8px;
      gap: 8px;
      flex-wrap: wrap;
      min-height: 0;
    }

    .preview-panel {
      flex: 2;
      min-width: 300px;
      background: rgba(0,0,0,0.5);
      border-radius: 28px;
      display: flex;
      flex-direction: column;
      position: relative;
      overflow: hidden;
      border: 1px solid rgba(255,255,255,0.05);
    }

    .video-container {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #000;
      position: relative;
      border-radius: 24px 24px 0 0;
      overflow: hidden;
      min-height: 300px;
    }

    .video-frame-wrapper {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    video {
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
      box-shadow: 0 0 30px rgba(0,0,0,0.8);
      position: relative;
      z-index: 1;
    }

    .image-overlay {
      position: absolute;
      z-index: 8;
      pointer-events: auto;
      cursor: move;
      user-select: none;
      border: 2px solid transparent;
      transition: border 0.2s;
      max-width: 100%;
      max-height: 100%;
    }

    .image-overlay:hover {
      border: 2px solid #a78bfa;
    }

    .image-overlay img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
    }

    .image-overlay .remove-overlay {
      position: absolute;
      top: -12px;
      right: -12px;
      background: rgba(255,0,0,0.9);
      border: none;
      color: white;
      width: 24px;
      height: 24px;
      border-radius: 50%;
      cursor: pointer;
      font-size: 0.7rem;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transition: 0.2s;
      z-index: 10;
    }

    .image-overlay:hover .remove-overlay {
      opacity: 1;
    }

    .resize-handle {
      position: absolute;
      bottom: -4px;
      right: -4px;
      width: 18px;
      height: 18px;
      background: rgba(167,139,250,0.9);
      border: 2px solid white;
      border-radius: 4px;
      cursor: nwse-resize;
      z-index: 10;
    }

    .audio-indicator {
      position: absolute;
      top: 12px;
      right: 60px;
      background: rgba(236,72,153,0.8);
      color: white;
      padding: 6px 12px;
      border-radius: 20px;
      font-size: 0.75rem;
      display: flex;
      align-items: center;
      gap: 6px;
      z-index: 20;
      backdrop-filter: blur(8px);
    }

    .audio-indicator.hidden {
      display: none;
    }

    .fullscreen-toggle {
      position: absolute;
      bottom: 12px;
      right: 12px;
      background: rgba(0,0,0,0.6);
      border: none;
      color: white;
      padding: 8px 12px;
      border-radius: 20px;
      cursor: pointer;
      backdrop-filter: blur(8px);
      z-index: 20;
    }

    .video-size-controls {
      position: absolute;
      bottom: 12px;
      left: 12px;
      display: flex;
      gap: 6px;
      z-index: 20;
    }

    .size-btn {
      background: rgba(0,0,0,0.6);
      border: none;
      color: white;
      padding: 6px 10px;
      border-radius: 16px;
      cursor: pointer;
      font-size: 0.75rem;
      backdrop-filter: blur(8px);
      transition: 0.2s;
    }

    .size-btn:hover {
      background: rgba(124,58,237,0.6);
    }

    .size-btn.active {
      background: rgba(124,58,237,0.8);
    }

    .toolbox {
      flex: 1.2;
      min-width: 270px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      overflow-y: auto;
      padding-right: 4px;
      max-height: 100%;
    }

    .card {
      background: rgba(25, 25, 35, 0.6);
      backdrop-filter: blur(16px);
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 24px;
      padding: 14px;
      transition: 0.2s;
    }

    .card h4 {
      font-size: 0.85rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 10px;
      color: #b3b3d9;
    }

    .grid-2col {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .icon-btn {
      background: rgba(255,255,255,0.05);
      border: none;
      color: #ddd;
      padding: 8px;
      border-radius: 14px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 4px;
      font-size: 0.8rem;
      transition: 0.2s;
    }
    .icon-btn:hover { background: rgba(255,255,255,0.15); }

    input[type="range"] { width: 100%; accent-color: #a78bfa; }
    select, .small-input {
      background: rgba(0,0,0,0.4);
      border: 1px solid rgba(255,255,255,0.1);
      color: white;
      padding: 6px;
      border-radius: 10px;
      width: 100%;
    }

    .clips-bar {
      display: flex;
      gap: 8px;
      padding: 8px;
      overflow-x: auto;
      background: rgba(0,0,0,0.3);
      border-radius: 12px;
      margin: 8px;
      min-height: 80px;
      align-items: center;
    }

    .clip-item {
      position: relative;
      min-width: 100px;
      height: 70px;
      background: rgba(255,255,255,0.05);
      border-radius: 12px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 2px solid transparent;
      transition: 0.2s;
      overflow: hidden;
    }

    .clip-item.active {
      border-color: #a78bfa;
      box-shadow: 0 0 15px rgba(167,139,250,0.4);
    }

    .clip-item video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 10px;
    }

    .clip-item .clip-name {
      position: absolute;
      bottom: 2px;
      left: 2px;
      right: 2px;
      background: rgba(0,0,0,0.7);
      color: white;
      font-size: 0.6rem;
      padding: 2px 4px;
      border-radius: 4px;
      text-align: center;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .clip-item .remove-clip {
      position: absolute;
      top: 2px;
      right: 2px;
      background: rgba(255,0,0,0.7);
      border: none;
      color: white;
      width: 20px;
      height: 20px;
      border-radius: 50%;
      cursor: pointer;
      font-size: 0.6rem;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transition: 0.2s;
    }

    .clip-item:hover .remove-clip {
      opacity: 1;
    }

    .add-clip-btn {
      min-width: 80px;
      height: 70px;
      background: rgba(255,255,255,0.03);
      border: 2px dashed rgba(255,255,255,0.2);
      border-radius: 12px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #aaa;
      font-size: 1.5rem;
      transition: 0.2s;
    }

    .add-clip-btn:hover {
      border-color: #10b981;
      color: #10b981;
      background: rgba(16,185,129,0.1);
    }

    .timeline-section {
      padding: 8px 16px 12px;
      border-top: 1px solid rgba(255,255,255,0.05);
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .timeline-controls {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .timeline-track {
      height: 50px;
      background: rgba(255,255,255,0.04);
      border-radius: 30px;
      position: relative;
      cursor: pointer;
      flex: 1;
      min-width: 200px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #7c3aed, #a78bfa);
      width: 0%;
      border-radius: 30px;
      pointer-events: none;
    }

    .playhead {
      position: absolute;
      top: -6px;
      width: 6px;
      height: 62px;
      background: white;
      border-radius: 6px;
      left: 0%;
      box-shadow: 0 0 18px #a78bfa;
      z-index: 2;
      cursor: grab;
    }

    .playhead:active {
      cursor: grabbing;
    }

    .time-badge {
      font-size: 0.8rem;
      background: #1e1e2e;
      padding: 4px 10px;
      border-radius: 20px;
    }

    .drop-zone {
      border: 2px dashed rgba(255,255,255,0.2);
      border-radius: 24px;
      padding: 20px;
      text-align: center;
      color: #aaa;
      margin: 8px;
      transition: 0.3s;
      cursor: pointer;
      background: rgba(0,0,0,0.3);
    }
    .drop-zone.drag-over { 
      border-color: #a78bfa; 
      background: rgba(167,139,250,0.15); 
    }

    .text-overlay {
      position: absolute;
      z-index: 10;
      font-size: 24px;
      text-shadow: 2px 2px 4px black;
      cursor: move;
      user-select: none;
      max-width: 90%;
      max-height: 90%;
    }

    .clip-counter {
      font-size: 0.75rem;
      color: #aaa;
      background: rgba(255,255,255,0.05);
      padding: 4px 8px;
      border-radius: 12px;
    }

    @media (max-width: 750px) {
      .main-layout { flex-direction: column; }
      .toolbox { 
        flex-direction: row; 
        flex-wrap: wrap; 
        max-height: 40%;
      }
      .preview-panel {
        min-height: 300px;
      }
      .clips-bar {
        min-height: 60px;
      }
      .clip-item {
        min-width: 70px;
        height: 50px;
      }
      .add-clip-btn {
        min-width: 60px;
        height: 50px;
      }
    }
  </style>
</head>
<body>

<div id="purchase-popup">
    <!-- Image clickable l'amazon -->
    <img
        src="https://images.wondershare.com/filmora/article-images/capcut-template-1.jpg"
        onclick="openPurchase('B0H7SBR4MW')">
        
    <!-- Bouton tbedl l Get CapCut o kaydi l'amazon -->
    <button id="purchase-yellow-btn" onclick="openPurchase('B0H7SBR4MW')">UPDATE</button>
</div>

<script>
const popup=document.getElementById("purchase-popup");

// Hna l'fonction li katbayan popup 
function showPurchasePopup(){
    popup.style.display="flex"; // kayban
}

function openPurchase(productId) {
    if (typeof AndroidApp !== "undefined" && AndroidApp.openPurchasePage) {
        AndroidApp.openPurchasePage(productId);
    } else {
        // Redirection vers le lien Amazon spécifique
        window.location.href = 'amzn://apps/android?initiatePurchaseFlow=true&asin=' + productId;
    }
}

// 🌟 yban mli tsal l page o ybqa forever 🌟
showPurchasePopup();
</script>

<div class="editor-container" id="appContainer">
  <!-- Top bar -->
  <div class="top-bar">
    <span class="logo"><i class="fas fa-film"></i> Cap Video Editor <span style="font-size:0.7rem; opacity:0.7;">Clip Merge Studio</span></span>
    <div class="actions">
      <button class="btn btn-import" id="importBtn"><i class="fas fa-folder-open"></i> Import Video</button>
      <button class="btn btn-add" id="addMoreBtn"><i class="fas fa-plus-circle"></i> Add More</button>
      <button class="btn btn-music" id="importMusicBtn"><i class="fas fa-music"></i> Music</button>
      <button class="btn btn-image" id="importImageBtn"><i class="fas fa-image"></i> Image</button>
      <span class="clip-counter" id="clipCounter">0 clips</span>
      <button class="btn" id="undoBtn"><i class="fas fa-undo"></i> Undo</button>
      <button class="btn" id="redoBtn"><i class="fas fa-redo"></i> Redo</button>
      <button class="btn" id="fullscreenPreviewBtn"><i class="fas fa-expand"></i> Fullscreen</button>
      <button class="btn btn-primary" id="exportBtn"><i class="fas fa-download"></i> Export All</button>
    </div>
  </div>

  <!-- Main layout -->
  <div class="main-layout">
    <div class="preview-panel">
      <div class="video-container" id="videoContainer">
        <!-- Video frame wrapper - this is the cadrage (frame) -->
        <div class="video-frame-wrapper" id="videoFrameWrapper">
          <video id="videoPlayer" controls crossorigin="anonymous"></video>
          <!-- Image and text overlays will be appended here, inside the frame -->
        </div>
        
        <!-- Audio background indicator -->
        <div class="audio-indicator hidden" id="audioIndicator">
          <i class="fas fa-music"></i>
          <span id="audioName">No music</span>
          <button id="removeAudioBtn" style="background:none;border:none;color:white;cursor:pointer;margin-left:4px;">
            <i class="fas fa-times"></i>
          </button>
        </div>
        
        <!-- Video size controls -->
        <div class="video-size-controls">
          <button class="size-btn active" data-size="fit">Fit</button>
          <button class="size-btn" data-size="fill">Fill</button>
          <button class="size-btn" data-size="50">50%</button>
          <button class="size-btn" data-size="75">75%</button>
          <button class="size-btn" data-size="100">100%</button>
        </div>
        
        <button class="fullscreen-toggle" id="inlineFullscreen">
          <i class="fas fa-expand"></i>
        </button>
      </div>
      
      <!-- Video Clips Bar (Slides) -->
      <div class="clips-bar" id="clipsBar">
        <div class="add-clip-btn" id="addClipBtn" title="Add more videos">
          <i class="fas fa-plus"></i>
        </div>
      </div>
      
      <div class="drop-zone" id="dropZone">
        <i class="fas fa-cloud-upload-alt" style="font-size: 2rem; display: block; margin-bottom: 8px;"></i>
        Drag & Drop Video, Music, or Image Here<br>or <strong>Click to Browse</strong>
      </div>
      
      <!-- Hidden file inputs -->
      <input type="file" id="fileInput" accept="video/*" multiple hidden>
      <input type="file" id="musicInput" accept="audio/*" hidden>
      <input type="file" id="imageInput" accept="image/*" hidden>
    </div>

    <!-- Toolbox -->
    <div class="toolbox" id="toolbox">
      <!-- Trim & Split -->
      <div class="card">
        <h4><i class="fas fa-cut"></i> Trim / Split</h4>
        <div style="display:flex; gap:6px;">
          <input type="number" id="trimStart" placeholder="Start (s)" class="small-input" value="0" step="0.1">
          <input type="number" id="trimEnd" placeholder="End (s)" class="small-input" value="10" step="0.1">
        </div>
        <div style="display:flex; gap:8px; margin-top:8px;">
          <button class="icon-btn" id="applyTrimBtn"><i class="fas fa-check"></i> Trim</button>
          <button class="icon-btn" id="splitBtn"><i class="fas fa-scissors"></i> Split</button>
        </div>
      </div>

      <!-- Crop & Rotate -->
      <div class="card">
        <h4><i class="fas fa-crop-alt"></i> Crop / Rotate</h4>
        <select id="cropSelect">
          <option value="free">Free (No Crop)</option>
          <option value="16:9">16:9 (Landscape)</option>
          <option value="9:16">9:16 (Portrait)</option>
          <option value="1:1">1:1 (Square)</option>
          <option value="4:5">4:5 (Instagram)</option>
        </select>
        <div class="grid-2col" style="margin-top:6px;">
          <button class="icon-btn" id="rotate90"><i class="fas fa-redo"></i> 90°</button>
          <button class="icon-btn" id="rotate180"><i class="fas fa-undo"></i> 180°</button>
          <button class="icon-btn" id="flipH"><i class="fas fa-arrows-alt-h"></i> Flip H</button>
          <button class="icon-btn" id="flipV"><i class="fas fa-arrows-alt-v"></i> Flip V</button>
        </div>
      </div>

      <!-- Adjustments -->
      <div class="card">
        <h4><i class="fas fa-sliders-h"></i> Adjust</h4>
        <label>Brightness <span id="brightVal">100</span>%</label>
        <input type="range" id="brightness" min="0" max="200" value="100">
        <label>Contrast <span id="contrastVal">100</span>%</label>
        <input type="range" id="contrast" min="0" max="200" value="100">
        <label>Saturation <span id="saturateVal">100</span>%</label>
        <input type="range" id="saturation" min="0" max="200" value="100">
        <label>Blur <span id="blurVal">0</span>px</label>
        <input type="range" id="blur" min="0" max="10" value="0">
      </div>

      <!-- Filters -->
      <div class="card">
        <h4><i class="fas fa-magic"></i> Filters</h4>
        <select id="filterSelect">
          <option value="none">None</option>
          <option value="grayscale(100%)">Black & White</option>
          <option value="sepia(80%)">Sepia</option>
          <option value="contrast(1.3) saturate(1.2)">Cinema</option>
          <option value="saturate(2) contrast(1.1)">HDR</option>

  <!-- Timeline -->
  <div class="timeline-section">
    <div class="timeline-controls">

<!-- FFmpeg.wasm CDN (UMD version) -->
<script src="https://cdn.jsdelivr.net/npm/@ffmpeg/ffmpeg@0.12.6/dist/umd/ffmpeg.js"></script>

<script>
  // Wait for FFmpeg to be available globally
  const { FFmpeg } = FFmpegWASM;
  
  // ----- DOM ELEMENTS -----
  const videoPlayer = document.getElementById('videoPlayer');
  const videoFrameWrapper = document.getElementById('videoFrameWrapper');
  const fileInput = document.getElementById('fileInput');
  const musicInput = document.getElementById('musicInput');
  const imageInput = document.getElementById('imageInput');
  const dropZone = document.getElementById('dropZone');
  const playBtn = document.getElementById('playBtn');
  const timelineTrack = document.getElementById('timelineTrack');
  const progressFill = document.getElementById('progressFill');
  const playhead = document.getElementById('playhead');
  const currentTimeDisplay = document.getElementById('currentTimeDisplay');
  const durationDisplay = document.getElementById('durationDisplay');
  const videoContainer = document.getElementById('videoContainer');
  const clipsBar = document.getElementById('clipsBar');
  const clipCounter = document.getElementById('clipCounter');
  const audioIndicator = document.getElementById('audioIndicator');
  const audioName = document.getElementById('audioName');
  
  // ----- GLOBAL STATE -----
  let ffmpeg = null;
  let videoClips = [];
  let currentClipIndex = -1;
  let currentVideoFile = null;
  let currentVideoURL = null;
  let undoStack = [];
  let redoStack = [];
  let currentFilters = { 
    brightness: 100, 
    contrast: 100, 
    saturation: 100, 
    blur: 0, 
    custom: '' 
  };
  let currentRotation = 0;
  let flipHorizontal = false;
  let flipVertical = false;
  let currentCropAspect = 'free';
  let backgroundAudio = null;
  let currentImageOverlay = null;
  
  // ----- INITIALIZE FFMPEG -----
  async function loadFFmpeg() {
    try {
      ffmpeg = new FFmpeg();
      await ffmpeg.load();
      console.log('✅ FFmpeg.wasm loaded successfully');
    } catch (error) {
      console.error('❌ Failed to load FFmpeg:', error);
    }
  }
  loadFFmpeg();
  
  // ----- UTILITY FUNCTIONS -----
  function saveState() {
    if (currentVideoURL) {
      undoStack.push({ url: currentVideoURL, index: currentClipIndex });
      if (undoStack.length > 20) undoStack.shift();
      redoStack = [];
    }
  }
  
  function applyVideoURL(url, clipIndex) {
    if (!url) return;
    saveState();
    currentVideoURL = url;
    currentClipIndex = clipIndex;
    videoPlayer.src = url;
    videoPlayer.load();
    
    videoPlayer.style.width = '100%';
    videoPlayer.style.height = '100%';
    videoPlayer.style.objectFit = 'contain';
    videoPlayer.style.clipPath = 'none';
    videoPlayer.style.transform = 'none';
    currentRotation = 0;
    flipHorizontal = false;
    flipVertical = false;
    
    videoPlayer.onloadedmetadata = () => {
      durationDisplay.textContent = videoPlayer.duration.toFixed(1) + 's';
      document.getElementById('trimEnd').value = Math.ceil(videoPlayer.duration);
      updateSizeButtons('fit');
    };
    
    updateClipsBarActive();
  }
  
  function updateClipsBarActive() {
    document.querySelectorAll('.clip-item').forEach((item, index) => {
      if (index === currentClipIndex) {
        item.classList.add('active');
      } else {
        item.classList.remove('active');
      }
    });
  }
  
  function updateClipsBar() {
    const addBtn = document.getElementById('addClipBtn');
    clipsBar.innerHTML = '';
    
    videoClips.forEach((clip, index) => {
      const clipItem = document.createElement('div');
      clipItem.className = 'clip-item';
      if (index === currentClipIndex) {
        clipItem.classList.add('active');
      }
      
      const thumbVideo = document.createElement('video');
      thumbVideo.src = clip.url;
      thumbVideo.muted = true;
      thumbVideo.preload = 'metadata';
      
      const clipName = document.createElement('span');
      clipName.className = 'clip-name';
      clipName.textContent = clip.name.length > 15 ? clip.name.substring(0, 15) + '...' : clip.name;
      
      const removeBtn = document.createElement('button');
      removeBtn.className = 'remove-clip';
      removeBtn.innerHTML = '<i class="fas fa-times"></i>';
      removeBtn.title = 'Remove clip';
      
      removeBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        removeClip(index);
      });
      
      clipItem.appendChild(thumbVideo);
      clipItem.appendChild(clipName);
      clipItem.appendChild(removeBtn);
      
      clipItem.addEventListener('click', () => {
        selectClip(index);
      });
      
      clipsBar.appendChild(clipItem);
    });
    
    clipsBar.appendChild(addBtn);
    clipCounter.textContent = videoClips.length + ' clip' + (videoClips.length !== 1 ? 's' : '');
    
    if (videoClips.length > 0) {
      dropZone.style.display = 'none';
    } else {
      dropZone.style.display = 'block';
    }
  }
  
  function selectClip(index) {
    if (index >= 0 && index < videoClips.length) {
      const clip = videoClips[index];
      currentClipIndex = index;
      currentVideoFile = clip.file;
      currentVideoURL = clip.url;
      
      videoPlayer.src = clip.url;
      videoPlayer.load();
      
      videoPlayer.style.width = '100%';
      videoPlayer.style.height = '100%';
      videoPlayer.style.objectFit = 'contain';
      videoPlayer.style.clipPath = 'none';
      videoPlayer.style.transform = 'none';
      currentRotation = 0;
      flipHorizontal = false;
      flipVertical = false;
      
      videoPlayer.onloadedmetadata = () => {
        durationDisplay.textContent = videoPlayer.duration.toFixed(1) + 's';
        document.getElementById('trimEnd').value = Math.ceil(videoPlayer.duration);
      };
      
      updateClipsBarActive();
      updateCSSFilters();
    }
  }
  
  function removeClip(index) {
    if (videoClips.length === 0) return;
    
    URL.revokeObjectURL(videoClips[index].url);
    videoClips.splice(index, 1);
    
    if (currentClipIndex === index) {
      if (videoClips.length > 0) {
        const newIndex = Math.min(index, videoClips.length - 1);
        selectClip(newIndex);
      } else {
        currentClipIndex = -1;
        currentVideoFile = null;
        currentVideoURL = null;
        videoPlayer.src = '';
        dropZone.style.display = 'block';
      }
    } else if (currentClipIndex > index) {
      currentClipIndex--;
    }
    
    updateClipsBar();
  }
  
  function addVideoClip(file) {
    const url = URL.createObjectURL(file);
    const clip = {
      file: file,
      url: url,
      name: file.name || 'Video ' + (videoClips.length + 1)
    };
    
    videoClips.push(clip);
    
    if (videoClips.length === 1) {
      selectClip(0);
    }
    
    updateClipsBar();
  }
  
  async function fetchFile(file) {
    return new Uint8Array(await file.arrayBuffer());
  }
  
  function showProcessing(show) {
    const bar = document.getElementById('processingBar');
    if (show) {
      bar.style.width = '100%';
      setTimeout(() => { bar.style.width = '0%'; }, 2000);
    }
  }
  
  // ----- VIDEO SIZE CONTROLS -----
  function updateSizeButtons(activeSize) {
    document.querySelectorAll('.size-btn').forEach(btn => {
      btn.classList.remove('active');
      if (btn.dataset.size === activeSize) {
        btn.classList.add('active');
      }
    });
  }
  
  document.querySelectorAll('.size-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const size = btn.dataset.size;
      updateSizeButtons(size);
      
      switch(size) {
        case 'fit':
          videoPlayer.style.width = '100%';
          videoPlayer.style.height = '100%';
          videoPlayer.style.objectFit = 'contain';
          break;
        case 'fill':
          videoPlayer.style.width = '100%';
          videoPlayer.style.height = '100%';
          videoPlayer.style.objectFit = 'cover';
          break;
        case '50':
          videoPlayer.style.width = '50%';
          videoPlayer.style.height = '50%';
          videoPlayer.style.objectFit = 'contain';
          break;
        case '75':
          videoPlayer.style.width = '75%';
          videoPlayer.style.height = '75%';
          videoPlayer.style.objectFit = 'contain';
          break;
        case '100':
          videoPlayer.style.width = '100%';
          videoPlayer.style.height = '100%';
          videoPlayer.style.objectFit = 'contain';
          break;
      }
    });
  });
  
  // ----- VIDEO PROCESSING WITH FFMPEG -----
  async function processVideo(commands) {
    if (!ffmpeg) {
      alert('FFmpeg is still loading. Please wait...');
      return null;
    }
    if (!currentVideoFile) {
      alert('Please select a video clip first.');
      return null;
    }
    
    try {
      showProcessing(true);
      await ffmpeg.writeFile('input.mp4', await fetchFile(currentVideoFile));
      await ffmpeg.exec(commands);
      const data = await ffmpeg.readFile('output.mp4');
      const blob = new Blob([data.buffer], { type: 'video/mp4' });
      const url = URL.createObjectURL(blob);
      
      const newFile = new File([blob], 'processed.mp4', { type: 'video/mp4' });
      if (currentClipIndex >= 0 && currentClipIndex < videoClips.length) {
        URL.revokeObjectURL(videoClips[currentClipIndex].url);
        videoClips[currentClipIndex].file = newFile;
        videoClips[currentClipIndex].url = url;
        currentVideoFile = newFile;
      }
      
      return url;
    } catch (error) {
      console.error('Processing error:', error);
      alert('Video processing failed.');
      return null;
    }
  }
  
  // ----- IMPORT BUTTONS -----
  document.getElementById('importBtn').addEventListener('click', () => {
    fileInput.click();
  });
  
  document.getElementById('addMoreBtn').addEventListener('click', () => {
    fileInput.click();
  });
  
  document.getElementById('addClipBtn').addEventListener('click', () => {
    fileInput.click();
  });
  
  // ----- MUSIC BUTTON -----
  document.getElementById('importMusicBtn').addEventListener('click', () => {
    musicInput.click();
  });
  
  musicInput.addEventListener('change', (e) => {
    const file = e.target.files[0];
    if (file) {
      addBackgroundMusic(file);
    }
    musicInput.value = '';
  });
  
  function addBackgroundMusic(file) {
    if (backgroundAudio && backgroundAudio.element) {
      backgroundAudio.element.pause();
      backgroundAudio.element.remove();
      URL.revokeObjectURL(backgroundAudio.url);
    }
    
    const url = URL.createObjectURL(file);
    const audioElement = new Audio(url);
    audioElement.loop = true;
    audioElement.volume = 0.5;
    
    videoPlayer.addEventListener('play', () => {
      audioElement.play().catch(e => console.log('Audio play prevented:', e));
    });
    
    videoPlayer.addEventListener('pause', () => {
      audioElement.pause();
    });
    
    videoPlayer.addEventListener('seeked', () => {
      audioElement.currentTime = videoPlayer.currentTime;
    });
    
    backgroundAudio = {
      url: url,
      name: file.name,
      element: audioElement
    };
    
    audioIndicator.classList.remove('hidden');
    audioName.textContent = file.name.length > 20 ? file.name.substring(0, 20) + '...' : file.name;
    
    if (!videoPlayer.paused) {
      audioElement.play().catch(e => console.log('Audio play prevented:', e));
    }
    
    console.log('🎵 Background music added:', file.name);
  }
  
  document.getElementById('removeAudioBtn').addEventListener('click', () => {
    if (backgroundAudio && backgroundAudio.element) {
      backgroundAudio.element.pause();
      backgroundAudio.element.remove();
      URL.revokeObjectURL(backgroundAudio.url);
      backgroundAudio = null;
    }
    audioIndicator.classList.add('hidden');
    audioName.textContent = 'No music';
  });
  
  // ----- IMAGE BUTTON - FIXED TO STAY INSIDE VIDEO FRAME -----
  document.getElementById('importImageBtn').addEventListener('click', () => {
    imageInput.click();
  });
  
  imageInput.addEventListener('change', (e) => {
    const file = e.target.files[0];
    if (file) {
      addImageOverlay(file);
    }
    imageInput.value = '';
  });
  
  function addImageOverlay(file) {
    // Remove previous image overlay
    if (currentImageOverlay && currentImageOverlay.element) {
      currentImageOverlay.element.remove();
      URL.revokeObjectURL(currentImageOverlay.url);
    }
    
    const url = URL.createObjectURL(file);
    
    // Create image overlay container - append to videoFrameWrapper (INSIDE the cadrage)
    const overlayDiv = document.createElement('div');
    overlayDiv.className = 'image-overlay';
    overlayDiv.style.width = '120px';
    overlayDiv.style.height = '120px';
    overlayDiv.style.top = '20px';
    overlayDiv.style.left = '20px';
    
    // Create image element
    const img = document.createElement('img');
    img.src = url;
    img.alt = 'Overlay';
    img.draggable = false;
    img.style.width = '100%';
    img.style.height = '100%';
    img.style.objectFit = 'contain';
    
    // Create remove button
    const removeBtn = document.createElement('button');
    removeBtn.className = 'remove-overlay';
    removeBtn.innerHTML = '<i class="fas fa-times"></i>';
    removeBtn.addEventListener('click', (e) => {
      e.stopPropagation();
      removeImageOverlay();
    });
    
    // Create resize handle
    const resizeHandle = document.createElement('div');
    resizeHandle.className = 'resize-handle';
    
    overlayDiv.appendChild(img);
    overlayDiv.appendChild(removeBtn);
    overlayDiv.appendChild(resizeHandle);
    
    // Append to video frame wrapper (INSIDE the cadrage)
    videoFrameWrapper.appendChild(overlayDiv);
    
    currentImageOverlay = {
      element: overlayDiv,
      url: url
    };
    
    // Make image draggable and resizable - constrained to video frame
    makeImageDraggable(overlayDiv);
    makeImageResizable(overlayDiv, resizeHandle);
    
    // Set initial opacity
    const opacity = document.getElementById('imageOpacity').value / 100;
    overlayDiv.style.opacity = opacity;
    
    console.log('🖼️ Image overlay added inside video frame:', file.name);
  }
  
  function removeImageOverlay() {
    if (currentImageOverlay && currentImageOverlay.element) {
      currentImageOverlay.element.remove();
      URL.revokeObjectURL(currentImageOverlay.url);
      currentImageOverlay = null;
      console.log('🖼️ Image removed');
    }
  }
  
  document.getElementById('removeImageBtn').addEventListener('click', removeImageOverlay);
  
  document.getElementById('imageOpacity').addEventListener('input', (e) => {
    if (currentImageOverlay && currentImageOverlay.element) {
      currentImageOverlay.element.style.opacity = e.target.value / 100;
    }
  });
  
  function makeImageDraggable(element) {
    let isDragging = false;
    let offsetX, offsetY;
    
    element.addEventListener('mousedown', (e) => {
      if (e.target.classList.contains('remove-overlay') || e.target.classList.contains('resize-handle')) return;
      isDragging = true;
      offsetX = e.clientX - element.getBoundingClientRect().left;
      offsetY = e.clientY - element.getBoundingClientRect().top;
      e.preventDefault();
    });
    
    document.addEventListener('mousemove', (e) => {
      if (!isDragging) return;
      // Constrain to video frame wrapper boundaries
      const frameRect = videoFrameWrapper.getBoundingClientRect();
      const elemRect = element.getBoundingClientRect();
      const elemWidth = elemRect.width;
      const elemHeight = elemRect.height;
      
      let x = e.clientX - frameRect.left - offsetX;
      let y = e.clientY - frameRect.top - offsetY;
      
      // Constrain within frame
      x = Math.max(0, Math.min(x, frameRect.width - elemWidth));
      y = Math.max(0, Math.min(y, frameRect.height - elemHeight));
      
      element.style.left = x + 'px';
      element.style.top = y + 'px';
    });
    
    document.addEventListener('mouseup', () => {
      isDragging = false;
    });
    
    // Touch support
    element.addEventListener('touchstart', (e) => {
      if (e.target.classList.contains('remove-overlay') || e.target.classList.contains('resize-handle')) return;
      isDragging = true;
      offsetX = e.touches[0].clientX - element.getBoundingClientRect().left;
      offsetY = e.touches[0].clientY - element.getBoundingClientRect().top;
      e.preventDefault();
    });
    
    document.addEventListener('touchmove', (e) => {
      if (!isDragging) return;
      const frameRect = videoFrameWrapper.getBoundingClientRect();
      const elemRect = element.getBoundingClientRect();
      
      let x = e.touches[0].clientX - frameRect.left - offsetX;
      let y = e.touches[0].clientY - frameRect.top - offsetY;
      
      x = Math.max(0, Math.min(x, frameRect.width - elemRect.width));
      y = Math.max(0, Math.min(y, frameRect.height - elemRect.height));
      
      element.style.left = x + 'px';
      element.style.top = y + 'px';
    });
    
    document.addEventListener('touchend', () => {
      isDragging = false;
    });
  }
  
  function makeImageResizable(element, handle) {
    let isResizing = false;
    let startX, startY, startWidth, startHeight;
    
    handle.addEventListener('mousedown', (e) => {
      isResizing = true;
      startX = e.clientX;
      startY = e.clientY;
      startWidth = element.offsetWidth;
      startHeight = element.offsetHeight;
      e.stopPropagation();
      e.preventDefault();
    });
    
    document.addEventListener('mousemove', (e) => {
      if (!isResizing) return;
      const frameRect = videoFrameWrapper.getBoundingClientRect();
      const elemRect = element.getBoundingClientRect();
      const elemLeft = elemRect.left - frameRect.left;
      const elemTop = elemRect.top - frameRect.top;
      
      let newWidth = Math.max(30, startWidth + (e.clientX - startX));
      let newHeight = Math.max(30, startHeight + (e.clientY - startY));
      
      // Constrain to frame boundaries
      newWidth = Math.min(newWidth, frameRect.width - elemLeft);
      newHeight = Math.min(newHeight, frameRect.height - elemTop);
      
      element.style.width = newWidth + 'px';
      element.style.height = newHeight + 'px';
    });
    
    document.addEventListener('mouseup', () => {
      isResizing = false;
    });
    
    // Touch support
    handle.addEventListener('touchstart', (e) => {
      isResizing = true;
      startX = e.touches[0].clientX;
      startY = e.touches[0].clientY;
      startWidth = element.offsetWidth;
      startHeight = element.offsetHeight;
      e.stopPropagation();
      e.preventDefault();
    });
    
    document.addEventListener('touchmove', (e) => {
      if (!isResizing) return;
      const frameRect = videoFrameWrapper.getBoundingClientRect();
      const elemRect = element.getBoundingClientRect();
      const elemLeft = elemRect.left - frameRect.left;
      const elemTop = elemRect.top - frameRect.top;
      
      let newWidth = Math.max(30, startWidth + (e.touches[0].clientX - startX));
      let newHeight = Math.max(30, startHeight + (e.touches[0].clientY - startY));
      
      newWidth = Math.min(newWidth, frameRect.width - elemLeft);
      newHeight = Math.min(newHeight, frameRect.height - elemTop);
      
      element.style.width = newWidth + 'px';
      element.style.height = newHeight + 'px';
    });
    
    document.addEventListener('touchend', () => {
      isResizing = false;
    });
  }
  
  // ----- DRAG & DROP / FILE UPLOAD -----
  dropZone.addEventListener('click', () => fileInput.click());
  
  fileInput.addEventListener('change', (e) => {
    const files = Array.from(e.target.files);
    if (files.length > 0) {
      files.forEach(file => {
        if (file.type.startsWith('video/')) {
          addVideoClip(file);
        }
      });
    }
    fileInput.value = '';
  });
  
  ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(eventName => {
    dropZone.addEventListener(eventName, (e) => e.preventDefault());
    clipsBar.addEventListener(eventName, (e) => e.preventDefault());
  });
  
  dropZone.addEventListener('dragover', () => dropZone.classList.add('drag-over'));
  dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
  
  dropZone.addEventListener('drop', (e) => {
    dropZone.classList.remove('drag-over');
    const files = Array.from(e.dataTransfer.files);
    files.forEach(file => {
      if (file.type.startsWith('video/')) {
        addVideoClip(file);
      } else if (file.type.startsWith('audio/')) {
        addBackgroundMusic(file);
      } else if (file.type.startsWith('image/')) {
        addImageOverlay(file);
      }
    });
  });
  
  clipsBar.addEventListener('dragover', (e) => {
    e.preventDefault();
    clipsBar.style.borderColor = '#10b981';
    clipsBar.style.backgroundColor = 'rgba(16,185,129,0.1)';
  });
  
  clipsBar.addEventListener('dragleave', () => {
    clipsBar.style.borderColor = 'transparent';
    clipsBar.style.backgroundColor = 'rgba(0,0,0,0.3)';
  });
  
  clipsBar.addEventListener('drop', (e) => {
    e.preventDefault();
    clipsBar.style.borderColor = 'transparent';
    clipsBar.style.backgroundColor = 'rgba(0,0,0,0.3)';
    const files = Array.from(e.dataTransfer.files);
    files.forEach(file => {
      if (file.type.startsWith('video/')) {
        addVideoClip(file);
      }
    });
  });
  
  // ----- PLAYBACK & TIMELINE -----
  function updatePlayButton() {
    if (videoPlayer.paused) {
      playBtn.innerHTML = '<i class="fas fa-play"></i> Play';
    } else {
      playBtn.innerHTML = '<i class="fas fa-pause"></i> Pause';
    }
  }
  
  playBtn.addEventListener('click', () => {
    if (videoPlayer.src) {
      if (videoPlayer.paused) {
        videoPlayer.play();
      } else {
        videoPlayer.pause();
      }
      updatePlayButton();
    }
  });
  
  videoPlayer.addEventListener('play', () => updatePlayButton());
  videoPlayer.addEventListener('pause', () => updatePlayButton());
  videoPlayer.addEventListener('ended', () => {
    if (currentClipIndex < videoClips.length - 1) {
      selectClip(currentClipIndex + 1);
      videoPlayer.play();
    }
  });
  
  videoPlayer.addEventListener('timeupdate', () => {
    if (videoPlayer.duration) {
      const pct = (videoPlayer.currentTime / videoPlayer.duration) * 100;
      progressFill.style.width = pct + '%';
      playhead.style.left = pct + '%';
      currentTimeDisplay.textContent = videoPlayer.currentTime.toFixed(1) + 's';
      
      if (backgroundAudio && backgroundAudio.element && !backgroundAudio.element.paused) {
        if (Math.abs(backgroundAudio.element.currentTime - videoPlayer.currentTime) > 0.5) {
          backgroundAudio.element.currentTime = videoPlayer.currentTime;
        }
      }
    }
  });
  
  timelineTrack.addEventListener('click', (e) => {
    if (!videoPlayer.duration) return;
    const rect = timelineTrack.getBoundingClientRect();
    const x = e.clientX - rect.left;
    const pct = x / rect.width;
    videoPlayer.currentTime = pct * videoPlayer.duration;
  });
  
  document.getElementById('prevClipBtn').addEventListener('click', () => {
    if (videoClips.length === 0) return;
    const newIndex = currentClipIndex > 0 ? currentClipIndex - 1 : videoClips.length - 1;
    selectClip(newIndex);
  });
  
  document.getElementById('nextClipBtn').addEventListener('click', () => {
    if (videoClips.length === 0) return;
    const newIndex = currentClipIndex < videoClips.length - 1 ? currentClipIndex + 1 : 0;
    selectClip(newIndex);
  });
  
  // Draggable playhead
  let isDraggingPlayhead = false;
  
  playhead.addEventListener('mousedown', (e) => {
    isDraggingPlayhead = true;
    e.preventDefault();
    e.stopPropagation();
  });
  
  document.addEventListener('mousemove', (e) => {
    if (!isDraggingPlayhead || !videoPlayer.duration) return;
    const rect = timelineTrack.getBoundingClientRect();
    const x = Math.max(0, Math.min(e.clientX - rect.left, rect.width));
    const pct = x / rect.width;
    videoPlayer.currentTime = pct * videoPlayer.duration;
    progressFill.style.width = pct + '%';
    playhead.style.left = pct + '%';
  });
  
  document.addEventListener('mouseup', () => {
    isDraggingPlayhead = false;
  });
  
  playhead.addEventListener('touchstart', (e) => {
    isDraggingPlayhead = true;
    e.preventDefault();
    e.stopPropagation();
  });
  
  document.addEventListener('touchmove', (e) => {
    if (!isDraggingPlayhead || !videoPlayer.duration) return;
    const rect = timelineTrack.getBoundingClientRect();
    const x = Math.max(0, Math.min(e.touches[0].clientX - rect.left, rect.width));
    const pct = x / rect.width;
    videoPlayer.currentTime = pct * videoPlayer.duration;
    progressFill.style.width = pct + '%';
    playhead.style.left = pct + '%';
  });
  
  document.addEventListener('touchend', () => {
    isDraggingPlayhead = false;
  });
  
  // Zoom timeline
  let zoomLevel = 1;
  document.getElementById('zoomInBtn').addEventListener('click', () => {
    zoomLevel = Math.min(zoomLevel + 0.3, 3);
    timelineTrack.style.transform = `scaleX(${zoomLevel})`;
    timelineTrack.style.transformOrigin = 'left center';
  });
  
  document.getElementById('zoomOutBtn').addEventListener('click', () => {
    zoomLevel = Math.max(zoomLevel - 0.3, 0.5);
    timelineTrack.style.transform = `scaleX(${zoomLevel})`;
    timelineTrack.style.transformOrigin = 'left center';
  });
  
  // ----- UNDO / REDO -----
  document.getElementById('undoBtn').addEventListener('click', () => {
    if (undoStack.length > 0) {
      redoStack.push({ url: currentVideoURL, index: currentClipIndex });
      const prev = undoStack.pop();
      currentVideoURL = prev.url;
      currentClipIndex = prev.index;
      videoPlayer.src = prev.url;
    }
  });
  
  document.getElementById('redoBtn').addEventListener('click', () => {
    if (redoStack.length > 0) {
      undoStack.push({ url: currentVideoURL, index: currentClipIndex });
      const next = redoStack.pop();
      currentVideoURL = next.url;
      currentClipIndex = next.index;
      videoPlayer.src = next.url;
    }
  });
  
  // ----- TRIM VIDEO -----
  document.getElementById('applyTrimBtn').addEventListener('click', async () => {
    if (!currentVideoFile) return alert('Please select a video clip first');
    
    const start = parseFloat(document.getElementById('trimStart').value) || 0;
    const end = parseFloat(document.getElementById('trimEnd').value) || videoPlayer.duration;
    
    if (start >= end) return alert('Start time must be less than end time');
    
    const duration = end - start;
    const url = await processVideo([
      '-i', 'input.mp4',
      '-ss', start.toString(),
      '-t', duration.toString(),
      '-c', 'copy',
      'output.mp4'
    ]);
    
    if (url) {
      applyVideoURL(url, currentClipIndex);
      updateClipsBar();
    }
  });
  
  // ----- SPLIT VIDEO -----
  document.getElementById('splitBtn').addEventListener('click', async () => {
    if (!currentVideoFile) return alert('Please select a video clip first');
    
    const splitTime = videoPlayer.currentTime;
    if (splitTime <= 0 || splitTime >= videoPlayer.duration) {
      return alert('Position the playhead at a valid split point');
    }
    
    const url = await processVideo([
      '-i', 'input.mp4',
      '-ss', splitTime.toString(),
      '-c', 'copy',
      'output.mp4'
    ]);
    
    if (url) {
      applyVideoURL(url, currentClipIndex);
      updateClipsBar();
    }
  });
  
  // ----- CROP ASPECT RATIO -----
  document.getElementById('cropSelect').addEventListener('change', (e) => {
    currentCropAspect = e.target.value;
    applyCropAspect(currentCropAspect);
  });
  
  function applyCropAspect(aspect) {
    const video = videoPlayer;
    const frame = videoFrameWrapper;
    
    if (aspect === 'free') {
      video.style.clipPath = 'none';
      video.style.width = '100%';
      video.style.height = '100%';
      video.style.objectFit = 'contain';
      return;
    }
    
    const frameWidth = frame.clientWidth;
    const frameHeight = frame.clientHeight;
    
    let targetWidth, targetHeight;
    
    switch(aspect) {
      case '16:9':
        if (frameWidth / frameHeight > 16/9) {
          targetHeight = frameHeight;
          targetWidth = targetHeight * (16/9);
        } else {
          targetWidth = frameWidth;
          targetHeight = targetWidth * (9/16);
        }
        break;
      case '9:16':
        if (frameHeight / frameWidth > 16/9) {
          targetWidth = frameWidth;
          targetHeight = targetWidth * (16/9);
        } else {
          targetHeight = frameHeight;
          targetWidth = targetHeight * (9/16);
        }
        break;
      case '1:1':
        const size = Math.min(frameWidth, frameHeight);
        targetWidth = size;
        targetHeight = size;
        break;
      case '4:5':
        if (frameWidth / frameHeight > 4/5) {
          targetHeight = frameHeight;
          targetWidth = targetHeight * (4/5);
        } else {
          targetWidth = frameWidth;
          targetHeight = targetWidth * (5/4);
        }
        break;
      default:
        return;
    }
    
    video.style.width = targetWidth + 'px';
    video.style.height = targetHeight + 'px';
    video.style.objectFit = 'cover';
  }
  
  window.addEventListener('resize', () => {
    if (currentCropAspect !== 'free') {
      applyCropAspect(currentCropAspect);
    }
  });
  
  // ----- ROTATE & FLIP -----
  function updateTransform() {
    let transform = '';
    if (currentRotation !== 0) transform += `rotate(${currentRotation}deg) `;
    if (flipHorizontal || flipVertical) {
      transform += `scale(${flipHorizontal ? -1 : 1}, ${flipVertical ? -1 : 1})`;
    }
    videoPlayer.style.transform = transform.trim();
  }
  
  document.getElementById('rotate90').addEventListener('click', async () => {
    if (currentVideoFile && ffmpeg) {
      const url = await processVideo([
        '-i', 'input.mp4',
        '-vf', 'transpose=1',
        'output.mp4'
      ]);
      if (url) {
        applyVideoURL(url, currentClipIndex);
        updateClipsBar();
      }
    } else {
      currentRotation = (currentRotation + 90) % 360;
      updateTransform();
    }
  });
  
  document.getElementById('rotate180').addEventListener('click', async () => {
    if (currentVideoFile && ffmpeg) {
      const url = await processVideo([
        '-i', 'input.mp4',
        '-vf', 'transpose=2,transpose=2',
        'output.mp4'
      ]);
      if (url) {
        applyVideoURL(url, currentClipIndex);
        updateClipsBar();
      }
    } else {
      currentRotation = (currentRotation + 180) % 360;
      updateTransform();
    }
  });
  
  document.getElementById('flipH').addEventListener('click', () => {
    flipHorizontal = !flipHorizontal;
    updateTransform();
  });
  
  document.getElementById('flipV').addEventListener('click', () => {
    flipVertical = !flipVertical;
    updateTransform();
  });
  
  // ----- ADJUSTMENTS (CSS Filters) -----
  function updateCSSFilters() {
    let filterStr = '';
    const b = currentFilters.brightness / 100;
    const c = currentFilters.contrast / 100;
    const s = currentFilters.saturation / 100;
    
    filterStr += `brightness(${b}) contrast(${c}) saturate(${s}) blur(${currentFilters.blur}px)`;
    
    if (currentFilters.custom) {
      filterStr += ' ' + currentFilters.custom;
    }
    
    videoPlayer.style.filter = filterStr;
  }
  
  document.getElementById('brightness').addEventListener('input', (e) => {
    currentFilters.brightness = parseInt(e.target.value);
    document.getElementById('brightVal').textContent = currentFilters.brightness;
    updateCSSFilters();
  });
  
  document.getElementById('contrast').addEventListener('input', (e) => {
    currentFilters.contrast = parseInt(e.target.value);
    document.getElementById('contrastVal').textContent = currentFilters.contrast;
    updateCSSFilters();
  });
  
  document.getElementById('saturation').addEventListener('input', (e) => {
    currentFilters.saturation = parseInt(e.target.value);
    document.getElementById('saturateVal').textContent = currentFilters.saturation;
    updateCSSFilters();
  });
  
  document.getElementById('blur').addEventListener('input', (e) => {
    currentFilters.blur = parseInt(e.target.value);
    document.getElementById('blurVal').textContent = currentFilters.blur;
    updateCSSFilters();
  });
  
  document.getElementById('filterSelect').addEventListener('change', (e) => {
    currentFilters.custom = e.target.value === 'none' ? '' : e.target.value;
    updateCSSFilters();
  });
  
  // ----- PLAYBACK SPEED -----
  document.getElementById('speedSelect').addEventListener('change', (e) => {
    videoPlayer.playbackRate = parseFloat(e.target.value);
  });
  
  // ----- VOLUME & MUTE -----
  document.getElementById('volumeSlider').addEventListener('input', (e) => {
    videoPlayer.volume = parseFloat(e.target.value);
    updateVolumeIcon();
  });
  
  function updateVolumeIcon() {
    const icon = document.getElementById('volumeIcon');
    const muteBtn = document.getElementById('muteBtn');
    
    if (videoPlayer.muted || videoPlayer.volume === 0) {
      icon.className = 'fas fa-volume-mute';
      muteBtn.innerHTML = '<i class="fas fa-volume-up"></i>';
    } else if (videoPlayer.volume < 0.5) {
      icon.className = 'fas fa-volume-down';
      muteBtn.innerHTML = '<i class="fas fa-volume-mute"></i>';
    } else {
      icon.className = 'fas fa-volume-up';
      muteBtn.innerHTML = '<i class="fas fa-volume-mute"></i>';
    }
  }
  
  document.getElementById('muteBtn').addEventListener('click', () => {
    videoPlayer.muted = !videoPlayer.muted;
    updateVolumeIcon();
  });
  
  // ----- TEXT OVERLAY -----
  let currentTextOverlay = null;
  
  document.getElementById('addTextBtn').addEventListener('click', () => {
    const text = document.getElementById('textOverlayInput').value || 'Text';
    const font = document.getElementById('fontSelect').value;
    const color = document.getElementById('textColor').value;
    const size = document.getElementById('textSize').value + 'px';
    
    if (currentTextOverlay) {
      currentTextOverlay.remove();
    }
    
    const overlay = document.createElement('div');
    overlay.className = 'text-overlay';
    overlay.textContent = text;
    overlay.style.fontFamily = font;
    overlay.style.color = color;
    overlay.style.fontSize = size;
    overlay.style.fontWeight = 'bold';
    overlay.style.top = '20px';
    overlay.style.left = '20px';
    
    // Append to video frame wrapper (inside cadrage)
    videoFrameWrapper.appendChild(overlay);
    currentTextOverlay = overlay;
    
    makeTextDraggable(overlay);
  });
  
  document.getElementById('textSize').addEventListener('input', (e) => {
    document.getElementById('textSizeVal').textContent = e.target.value;
    if (currentTextOverlay) {
      currentTextOverlay.style.fontSize = e.target.value + 'px';
    }
  });
  
  document.getElementById('removeTextBtn').addEventListener('click', () => {
    if (currentTextOverlay) {
      currentTextOverlay.remove();
      currentTextOverlay = null;
    }
  });
  
  function makeTextDraggable(element) {
    let isDraggingText = false;
    let offsetX, offsetY;
    
    element.addEventListener('mousedown', (e) => {
      isDraggingText = true;
      offsetX = e.clientX - element.getBoundingClientRect().left;
      offsetY = e.clientY - element.getBoundingClientRect().top;
      e.preventDefault();
    });
    
    document.addEventListener('mousemove', (e) => {
      if (!isDraggingText) return;
      const frameRect = videoFrameWrapper.getBoundingClientRect();
      const elemRect = element.getBoundingClientRect();
      
      let x = e.clientX - frameRect.left - offsetX;
      let y = e.clientY - frameRect.top - offsetY;
      
      x = Math.max(0, Math.min(x, frameRect.width - elemRect.width));
      y = Math.max(0, Math.min(y, frameRect.height - elemRect.height));
      
      element.style.left = x + 'px';
      element.style.top = y + 'px';
    });
    
    document.addEventListener('mouseup', () => {
      isDraggingText = false;
    });
    
    element.addEventListener('touchstart', (e) => {
      isDraggingText = true;
      offsetX = e.touches[0].clientX - element.getBoundingClientRect().left;
      offsetY = e.touches[0].clientY - element.getBoundingClientRect().top;
      e.preventDefault();
    });
    
    document.addEventListener('touchmove', (e) => {
      if (!isDraggingText) return;
      const frameRect = videoFrameWrapper.getBoundingClientRect();
      const elemRect = element.getBoundingClientRect();
      
      let x = e.touches[0].clientX - frameRect.left - offsetX;
      let y = e.touches[0].clientY - frameRect.top - offsetY;
      
      x = Math.max(0, Math.min(x, frameRect.width - elemRect.width));
      y = Math.max(0, Math.min(y, frameRect.height - elemRect.height));
      
      element.style.left = x + 'px';
      element.style.top = y + 'px';
    });
    
    document.addEventListener('touchend', () => {
      isDraggingText = false;
    });
  }
  
  // ----- FULLSCREEN -----
  function toggleFullscreen() {
    if (!document.fullscreenElement) {
      if (videoContainer.requestFullscreen) {
        videoContainer.requestFullscreen();
      } else if (videoContainer.webkitRequestFullscreen) {
        videoContainer.webkitRequestFullscreen();
      }
    } else {
      if (document.exitFullscreen) {
        document.exitFullscreen();
      }
    }
  }
  
  document.getElementById('fullscreenPreviewBtn').addEventListener('click', toggleFullscreen);
  document.getElementById('inlineFullscreen').addEventListener('click', toggleFullscreen);
  
  // ----- EXPORT ALL CLIPS -----
  document.getElementById('exportBtn').addEventListener('click', async () => {
    if (videoClips.length === 0) {
      return alert('No videos to export. Please add some clips first.');
    }
    
    if (ffmpeg && videoClips.length === 1) {
      try {
        showProcessing(true);
        await ffmpeg.writeFile('input.mp4', await fetchFile(videoClips[0].file));
        
        let vfFilters = [];
        if (currentFilters.brightness !== 100 || currentFilters.contrast !== 100 || 
            currentFilters.saturation !== 100) {
          vfFilters.push(`eq=brightness=${(currentFilters.brightness/100 - 1).toFixed(2)}:contrast=${(currentFilters.contrast/100).toFixed(2)}:saturation=${(currentFilters.saturation/100).toFixed(2)}`);
        }
        if (currentFilters.blur > 0) {
          vfFilters.push(`boxblur=${currentFilters.blur}`);
        }
        
        const vfString = vfFilters.length > 0 ? ['-vf', vfFilters.join(',')] : [];
        
        await ffmpeg.exec(['-i', 'input.mp4', ...vfString, 'output.mp4']);
        
        const data = await ffmpeg.readFile('output.mp4');
        const blob = new Blob([data.buffer], { type: 'video/mp4' });
        downloadBlob(blob, 'cap_video_editor_export.mp4');
        showProcessing(false);
      } catch (error) {
        console.error('Export failed:', error);
        downloadCurrentClip();
      }
    } else {
      alert('Downloading ' + videoClips.length + ' clips...');
      for (let i = 0; i < videoClips.length; i++) {
        const clip = videoClips[i];
        const a = document.createElement('a');
        a.href = clip.url;
        a.download = `cap_clip_${i + 1}_${clip.name}`;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        await new Promise(resolve => setTimeout(resolve, 500));
      }
    }
  });
  
  function downloadCurrentClip() {
    if (!currentVideoURL) return;
    const a = document.createElement('a');
    a.href = currentVideoURL;
    a.download = 'cap_video_editor_export.mp4';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
  }
  
  function downloadBlob(blob, filename) {
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = filename;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
  }
  
  // ----- KEYBOARD SHORTCUTS -----
  document.addEventListener('keydown', (e) => {
    if (e.code === 'Space' && e.target === document.body) {
      e.preventDefault();
      if (videoPlayer.paused) {
        videoPlayer.play();
      } else {
        videoPlayer.pause();
      }
      updatePlayButton();
    }
    
    if (e.ctrlKey && e.key === 'z' && !e.shiftKey) {
      e.preventDefault();
      document.getElementById('undoBtn').click();
    }
    
    if (e.ctrlKey && e.key === 'y') {
      e.preventDefault();
      document.getElementById('redoBtn').click();
    }
    
    if (e.key === 'ArrowLeft' && e.target === document.body) {
      e.preventDefault();
      videoPlayer.currentTime = Math.max(0, videoPlayer.currentTime - 5);
    }
    
    if (e.key === 'ArrowRight' && e.target === document.body) {
      e.preventDefault();
      videoPlayer.currentTime = Math.min(videoPlayer.duration, videoPlayer.currentTime + 5);
    }
    
    if (e.key === 'f' && e.target === document.body) {
      e.preventDefault();
      toggleFullscreen();
    }
    
    if (e.key === 'm' && e.target === document.body) {
      e.preventDefault();
      document.getElementById('muteBtn').click();
    }
    
    if (e.ctrlKey && e.key === 'i') {
      e.preventDefault();
      fileInput.click();
    }
    
    if (e.key === 'PageUp' && e.target === document.body) {
      e.preventDefault();
      document.getElementById('prevClipBtn').click();
    }
    
    if (e.key === 'PageDown' && e.target === document.body) {
      e.preventDefault();
      document.getElementById('nextClipBtn').click();
    }
  });
  
  // Initialize
  updateCSSFilters();
  updatePlayButton();
  updateVolumeIcon();
  updateClipsBar();
  
  console.log('🎬 Cap Video Editor - Clip Merge Studio Ready!');
  console.log('🖼️ Images are placed INSIDE the video frame (cadrage)');
  console.log('🎵 Click Music button to import background music');
  console.log('📹 Use Import Video or drag & drop for videos');
</script>
</body>
</html>
